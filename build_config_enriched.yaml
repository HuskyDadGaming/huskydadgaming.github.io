dungeons:
  shadowfang-keep:
    mapid: 33
    title: Shadowfang Keep
    page: shadowfang-keep.html
    faction: Both
    emoji: 🌒
    flavour: An ancient worgen-cursed keep in Silverpine Forest, ruled by the Archmage who created the affliction.
    summary:
      heading: 🎯 SFK Loot Summary
      intro: 'Equipment Focus: Worgen-themed gear in a haunted keep — caster blue trinkets, the Black Wolf set pieces, and unique daggers.'
      bullets:
      - label: Best for
        text: Level 17-22
      - label: Run time
        text: 30-45 minutes
      - label: Famous for
        text: Robes of Arugal, Meteor Shard, Witching Stave
      - label: Includes
        text: Multiple rare-spawn bosses (Fel Steed, Deathsworn Captain)
    bosses:
    - id: 3914
      name: Rethilgore
      type: boss
      description: First boss; worgen blade master
      notable: Soul Drain channel
    - id: 3886
      name: Razorclaw the Butcher
      type: boss
      description: Worgen brute butcher
      notable: Heavy melee cleaves
    - id: 3887
      name: Baron Silverlaine
      type: boss
      description: Former lord of the keep, now worgen-cursed
      notable: Veil of Shadow, melee burst
    - id: 4278
      name: Commander Springvale
      type: boss
      description: Undead Scarlet Crusade commander
      notable: Holy Strike, self-buffs
    - id: 4279
      name: Odo the Blindwatcher
      type: boss
      description: Worgen brute guarding the inner halls
      notable: Howling Rage frenzy
    - id: 4274
      name: Fenrus the Devourer
      type: boss
      description: Massive worgen pet of Arugal — event-summoned
      notable: Heavy melee, no special mechanics
    - id: 3927
      name: Wolf Master Nandos
      type: boss
      description: Worgen lord with wolf companions
      notable: Summons Bleak Worgs — kill adds first
    - id: 4275
      name: Archmage Arugal
      type: boss
      description: Final boss; necromancer who cursed the keep
      notable: Voidwalker summon, Shadow Bolt, Arcane Missiles
    - id: 3872
      name: Deathsworn Captain
      type: rare
      description: Rare elite undead
      notable: Heavy melee strikes
  the-stockade:
    mapid: 34
    title: The Stockade
    page: the-stockade.html
    faction: Alliance
    emoji: ⛓️
    flavour: Stormwind's underground prison, overrun by escaped Defias prisoners after a riot.
    summary:
      heading: 🎯 Stockade Loot Summary
      intro: 'Equipment Focus: Stormwind''s underground prison — small Alliance dungeon. Mostly modest loot but quick reps and a notable rare spawn.'
      bullets:
      - label: Best for
        text: Alliance level 24-28
      - label: Run time
        text: 20-30 minutes (smallest dungeon)
      - label: Famous for
        text: Iron Knuckles, Kam's Walking Stick, Defias Renegade Ring
      - label: Includes
        text: Bruegal Ironknuckle rare elite ⭐
      - label: Note
        text: Most non-rare bosses have poor loot — primarily run for quests
    bosses:
    - id: 1696
      name: Targorr the Dread
      type: boss
      description: First boss; Blackrock orc executioner
      notable: Thrash + Enrage (extra attacks)
    - id: 1666
      name: Kam Deepfury
      type: boss
      description: Renegade dwarf executioner
      notable: Heavy axe cleaves
    - id: 1717
      name: Hamhock
      type: boss
      description: Two-headed ogre prisoner
      notable: Bloodlust + Chain Lightning
    - id: 1716
      name: Bazil Thredd
      type: boss
      description: Final boss; renegade Defias leader
      notable: Summons rifts and inmate adds
    - id: 1663
      name: Dextren Ward
      type: boss
      description: Defias necromancer
      notable: Fear — counter with Tremor Totem / Fear Ward
    - id: 1720
      name: Bruegal Ironknuckle
      type: rare
      description: Rare elite human brawler
      notable: Pummel interrupt
  the-deadmines:
    mapid: 36
    title: The Deadmines
    page: the-deadmines.html
    faction: Alliance
    emoji: 🏴‍☠️
    flavour: A sprawling underground mine complex beneath Westfall, overrun by the notorious Defias Brotherhood. Home to iconic bosses and some of the most memorable loot in classic WoW.
    summary:
      heading: 🎯 DM Loot Summary
      intro: 'Equipment Focus: Complete dungeon with 24 high-quality blue equipment drops across 8 bosses! Perfect for Alliance players level 17-26.'
      bullets:
      - label: Best for
        text: Players level 17-26
      - label: Run time
        text: 30-45 minutes
      - label: Famous for
        text: Defias Brotherhood storyline, Edwin VanCleef finale
      - label: Boss loot
        text: 24 blues across 8 encounters with excellent drop rates
      - label: Includes
        text: Miner Johnson rare spawn ⭐
    bosses:
    - id: 644
      name: Rhahk'Zor
      type: boss
      description: Pirate captain of the Defias fleet
      notable: Cleaves, sounds party-buff horn
    - id: 642
      name: Sneed's Shredder
      type: boss
      description: Sneed in harvester mech
      notable: Two-phase encounter
    - id: 643
      name: Sneed
      type: boss
      description: Goblin shredder pilot — two phases
      notable: 'Phase 2: escapes wreck and fights solo'
      note: spawns from Sneed's Shredder
    - id: 1763
      name: Gilnid
      type: boss
      description: Goblin inventor
      notable: Mechanical contraptions
    - id: 646
      name: Mr. Smite
      type: boss
      description: Final boss; founder of the Defias Brotherhood
      notable: Two bodyguards spawn at 50% HP
    - id: 647
      name: Captain Greenskin
      type: boss
      description: Goblin engineer; cannon master
      notable: Summons Defias trash adds
    - id: 639
      name: Edwin VanCleef
      type: boss
      description: Defias Brotherhood leader
      notable: Final boss
    - id: 645
      name: Cookie
      type: boss
      description: Murloc cook of the pirate ship
      notable: Tainted Food debuff
    - id: 3586
      name: Miner Johnson
      type: rare
      description: Rare elite spawn
      notable: Mining rare
      rare: true
    notable_trash:
    - title: Notable Trash
      description: Useful green equipment from Defias Brotherhood and goblin crafters
      notable: Mid-tier gear
  wailing-caverns:
    mapid: 43
    title: Wailing Caverns
    page: wailing-caverns.html
    faction: Both
    emoji: 🌿
    flavour: A sprawling underground maze in the Barrens, corrupted by druidic magic gone wrong. Features multiple bosses with the coveted 'of the Fang' gear sets that define many leveling builds.
    summary:
      heading: 🎯 WC Loot Summary
      intro: 'Equipment Focus: Complete dungeon with 24 blue equipment drops across 8 encounters! Home of the legendary "of the Fang" sets.'
      bullets:
      - label: Best for
        text: Players level 17-24
      - label: Run time
        text: 45-60 minutes (large dungeon)
      - label: Famous for
        text: '"of the Fang" leather set, caster items'
      - label: Includes
        text: Deviate Faerie Dragon rare spawn ⭐
      - label: Notable trash
        text: Druid of the Fang blue equipment
    bosses:
    - id: 3671
      name: Lady Anacondra
      type: boss
      description: First Fang Lord; corrupted druid
      notable: Sleep cast, Lightning Bolt
    - id: 3669
      name: Lord Cobrahn
      type: boss
      description: Fang Lord; nature caster + healer
      notable: Healing Touch (interrupt), Lightning Bolt
    - id: 3653
      name: Kresh
      type: boss
      description: Optional first boss; giant turtle
      notable: Shell Shield damage reduction
    - id: 3670
      name: Lord Pythas
      type: boss
      description: Fang Lord; toughest of the four
      notable: Thunderclap, Sleep, Healing Touch
    - id: 3674
      name: Skum
      type: boss
      description: Mutated turtle abomination
      notable: Chained Lightning AoE
    - id: 3673
      name: Lord Serpentis
      type: boss
      description: Final Fang Lord; shapeshifting druid
      notable: Druid form changes, Wrath
    - id: 5775
      name: Verdan the Everliving
      type: boss
      description: Corrupted treant guardian
      notable: Grasping Roots immobilize
      note: hidden boss
    - id: 3654
      name: Mutanus the Devourer
      type: boss
      description: Final boss; massive murloc abomination
      notable: Mind Sleep + heavy melee
      note: event-summoned at end of Naralex awakening
    - id: 5912
      name: Deviate Faerie Dragon
      type: rare
      description: Rare elite spawn
      notable: Polymorph abilities
      rare: true
    - id: 3840
      name: Druid of the Fang
      type: notable_trash
      description: Notable elite trash — Druid of the Fang
      notable: Sleep + cobra-form melee
    notable_trash:
    - title: Notable Trash
      description: Elite trash with blue equipment
      notable: Druid of the Fang
  razorfen-kraul:
    mapid: 47
    title: Razorfen Kraul
    page: razorfen-kraul.html
    faction: Both
    emoji: 🐗
    flavour: A maze of thorns in the Barrens, home to the savage Quilboar tribes who worship Agamaggan.
    summary:
      heading: 🎯 RFK Loot Summary
      intro: 'Equipment Focus: Quilboar thorn maze in the Barrens. Strong drops for melee/leather and the iconic Razorflank loot.'
      bullets:
      - label: Best for
        text: Level 25-30
      - label: Run time
        text: 30-45 minutes
      - label: Famous for
        text: Charlga's Stave, Stoneslayer Hammer, Tusken Helm
      - label: Includes
        text: Blind Hunter rare elite ⭐
      - label: Note
        text: Wave-spawning Aggem Thorncurse fight is the trickiest
    bosses:
    - id: 6168
      name: Roogug
      type: boss
      description: First boss; rabid quilboar
      notable: Quick frenzy
    - id: 4424
      name: Aggem Thorncurse
      type: boss
      description: Quilboar warlord; wave-based fight
      notable: Adds spawn in waves; Lightning Bolt
    - id: 4428
      name: Death Speaker Jargba
      type: boss
      description: Quilboar fanatic warlord
      notable: Healing Wave + Lightning Bolt
    - id: 4420
      name: Overlord Ramtusk
      type: boss
      description: Quilboar warlord; tusked twin
      notable: Brutal cleaves
    - id: 4422
      name: Agathelos the Raging
      type: boss
      description: Massive corrupted boar
      notable: Knockdown charge
    - id: 4421
      name: Charlga Razorflank
      type: boss
      description: Final boss; matriarch of the Razorflank
      notable: Demoralizing Shout, Battle Shout, Strike
      note: final boss
    - id: 4842
      name: Earthcaller Halmgar
      type: rare
      description: Quilboar earth-shaman
      notable: Earth Shock + Stoneclaw Totem
    - id: 4425
      name: Blind Hunter
      type: rare
      description: Rare elite blind owl-beast
      notable: Sonic AoE blast
  blackfathom-deeps:
    mapid: 48
    title: Blackfathom Deeps
    page: blackfathom-deeps.html
    faction: Both
    emoji: 🌊
    flavour: A flooded elven temple in Ashenvale, now home to Twilight cultists and corrupted naga.
    summary:
      heading: 🎯 BFD Loot Summary
      intro: 'Equipment Focus: Drowned elven temple in Ashenvale. Naga and Twilight cultist drops with caster-friendly nature gear.'
      bullets:
      - label: Best for
        text: Level 22-26
      - label: Run time
        text: 60+ minutes (large, partially submerged)
      - label: Famous for
        text: Aquatic Sash, Slime-encrusted Pads, Reef Axe
      - label: Includes
        text: Twilight Pickaxe quest chain summons Baron Aquanis
      - label: Note
        text: Bring underwater breathing — large sections are submerged
    bosses:
    - id: 4887
      name: Ghamoo-ra
      type: boss
      description: First boss; giant turtle guardian
      notable: Shell Reflect — interrupt or burn
    - id: 4831
      name: Lady Sarevess
      type: boss
      description: Naga sorceress; second boss
      notable: Forked Lightning AoE
    - id: 6243
      name: Gelihast
      type: boss
      description: Naga warrior commander
      notable: Frost Shock + Earthgrab
    - id: 4830
      name: Old Serra'kis
      type: boss
      description: Massive shark; circle-pull
      notable: Bleeding Strike
    - id: 4832
      name: Twilight Lord Kelris
      type: boss
      description: Twilight Hammer cultist boss
      notable: Mind Blast + Mind Sleep
    - id: 4829
      name: Aku'mai
      type: boss
      description: Final boss; multi-headed water serpent
      notable: Acid breath AoE, Frost Nova
    - id: 12876
      name: Baron Aquanis
      type: rare
      description: Naga elemental — quest-summoned
      notable: Water-based AoE caster
      note: quest-summoned
    - id: 12902
      name: Lorgus Jett
      type: rare
      description: Twilight cultist — event-summoned
      notable: Frost magic
  gnomeregan:
    mapid: 90
    title: Gnomeregan
    page: gnomeregan.html
    faction: Both
    emoji: ⚙️
    flavour: The lost capital of the gnomes — irradiated and overrun by trogg invaders and rogue mechs.
    summary:
      heading: 🎯 Gnomeregan Loot Summary
      intro: 'Equipment Focus: Irradiated gnomish capital overrun by troggs. Tech-themed loot and notoriously long runs with maze-like layout.'
      bullets:
      - label: Best for
        text: Level 27-32
      - label: Run time
        text: 60-90 minutes (long, maze-like)
      - label: Famous for
        text: Workshop Assistant's Pail, Spidertank Oilrag, Mind-Expanding Mushroom
      - label: Includes
        text: Dark Iron Ambassador rare elite ⭐
      - label: Note
        text: Very easy to get lost — final boss is Mekgineer Thermaplugg
    bosses:
    - id: 7361
      name: Grubbis
      type: boss
      description: Trogg leader — quest-summoned
      notable: Summons Trogg adds in waves
      note: event-summoned
    - id: 7079
      name: Viscous Fallout
      type: boss
      description: Toxic ooze elemental
      notable: Toxic Volley AoE — cleansable poison
    - id: 6235
      name: Electrocutioner 6000
      type: boss
      description: Lightning maintenance bot
      notable: Chain Lightning AoE
    - id: 6229
      name: Crowd Pummeler 9-60
      type: boss
      description: Mechanical hammer-bot
      notable: Tantrum knockback, Pummel stun
    - id: 7800
      name: Mekgineer Thermaplugg
      type: boss
      description: Final boss; mad gnomish engineer
      notable: Bombs from podium, Walking Bomb adds
      note: final boss
    - id: 6228
      name: Dark Iron Ambassador
      type: rare
      description: Rare Dark Iron diplomat
      notable: Fire spells
  scarlet-monastery:
    mapid: 189
    title: Scarlet Monastery
    page: scarlet-monastery.html
    faction: Both
    emoji: ⚔️
    flavour: 'The fanatical Scarlet Crusade''s stronghold — four wings: Graveyard, Library, Armory, and Cathedral.'
    summary:
      heading: 🎯 Scarlet Monastery Loot Summary
      intro: 'Equipment Focus: The Scarlet Crusade''s stronghold — four wings with distinct loot tables. Premier dungeon for leveling 30s and 40s.'
      bullets:
      - label: Best for
        text: Levels 28-40 (varies by wing)
      - label: Wings
        text: Graveyard (~28-30), Library (~30-34), Armory (~33-37), Cathedral (~38-42)
      - label: Famous for
        text: Whitemane's Chapeau, Herod's Shoulder, Mograine's Might, Hand of Righteousness
      - label: Note
        text: Mograine + Whitemane two-stage fight in the Cathedral is the highlight
    bosses:
    - id: 3983
      name: Interrogator Vishas
      type: boss
      description: Library mid-boss; sadistic inquisitor
      notable: Holy Fire single-target burst
      wing: graveyard
    - id: 4543
      name: Bloodmage Thalnos
      type: boss
      description: Graveyard final boss; necromancer
      notable: Fireball + Frostbolt + raises skeletons
      wing: graveyard
    - id: 3974
      name: Houndmaster Loksey
      type: boss
      description: Armory first boss; commands Scarlet hounds
      notable: Summons two Scarlet Tracking Hounds
      wing: library
    - id: 6487
      name: Arcanist Doan
      type: boss
      description: Library final boss; arcane mage
      notable: Detonates Arcane Explosion at 50% HP — interrupt
      wing: library
    - id: 3975
      name: Herod
      type: boss
      description: Armory final boss; Crusade champion
      notable: Whirlwind cleave + summons trainees
      wing: armory
    - id: 4542
      name: High Inquisitor Fairbanks
      type: boss
      description: Optional Cathedral mid-boss
      notable: Curse of Blood (must remove before Mograine)
      wing: cathedral
    - id: 3976
      name: Scarlet Commander Mograine
      type: boss
      description: Cathedral co-boss; phase 1 of Whitemane fight
      notable: Two-phase — dies and Whitemane revives
      wing: cathedral
    - id: 3977
      name: High Inquisitor Whitemane
      type: boss
      description: Cathedral final boss; revives Mograine
      notable: Holy heals, raises Mograine at 50% HP
      wing: cathedral
    - id: 6490
      name: Azshir the Sleepless
      type: rare
      description: Graveyard rare; banshee
      notable: Mind Vision, Banshee Wail fear
      wing: graveyard
    - id: 6489
      name: Ironspine
      type: rare
      description: Graveyard rare; undead caster
      notable: Bone shatter shadowbolts
      wing: graveyard
    - id: 6488
      name: Fallen Champion
      type: rare
      description: Graveyard rare; undead warrior
      notable: Heavy strikes
      wing: graveyard
  ragefire-chasm:
    mapid: 389
    title: Ragefire Chasm
    page: ragefire-chasm.html
    faction: Horde
    emoji: 🔥
    flavour: A volcanic dungeon beneath Orgrimmar's Cleft of Shadow. The first dungeon many Horde players experience, offering solid starter gear with fire-themed encounters.
    summary:
      heading: 🎯 RFC Loot Summary
      intro: 'Equipment Focus: RFC has 6 high-quality blue drops from bosses, plus 8 useful green items from trash mobs! Perfect for new Horde players.'
      bullets:
      - label: Best for
        text: New players (level 13-18)
      - label: Run time
        text: 15-20 minutes
      - label: Boss drops
        text: 6 blues with high rates (20-40%)
      - label: Trash drops
        text: 8 greens with lower rates (5-9%)
      - label: Note
        text: Only 2 bosses drop equipment; others drop gems/materials/consumables
    bosses:
    - id: 11517
      name: Oggleflint
      type: boss
      description: First boss; Ragefire trogg chieftain
      notable: Cleave + melee burst
    - id: 11520
      name: Taragaman the Hungerer
      type: boss
      description: Felguard demon; Searing Blade enforcer
      notable: Fire Nova + Knock Away
    - id: 11518
      name: Jergosh the Invoker
      type: boss
      description: Searing Blade lieutenant; orc warlock
      notable: Immolate + Curse of Weakness
    - id: 11519
      name: Bazzalan
      type: boss
      description: Final boss; satyr rogue (Searing Blade lieutenant)
      notable: Sinister Strike + Deadly Poison
    notable_trash:
    - title: Notable Trash
      description: Elite trash mobs in RFC
      notable: Fire-themed creatures
