<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Azerothian Color Palette */
            --background-primary: #0a0a0f;
            --background-secondary: #1a1a25;
            --background-tertiary: #2a2a35;
            
            /* Gold Theme */
            --gold-primary: #ffd700;
            --gold-secondary: #ffed4a;
            --gold-dark: #b8860b;
            --gold-glow: rgba(255, 215, 0, 0.3);
            
            /* Tree Colors */
            --arms-color: #ff4444;
            --fury-color: #ff8800;
            --protection-color: #4488ff;
            
            /* Interactive States */
            --available: rgba(255, 255, 255, 0.9);
            --unavailable: rgba(255, 255, 255, 0.3);
            --active: var(--gold-primary);
            --maxed: #00ff88;
            
            /* Typography */
            --font-display: 'Cinzel', serif;
            --font-body: 'Crimson Text', serif;
            
            /* Shadows & Effects */
            --shadow-deep: 0 8px 32px rgba(0, 0, 0, 0.8);
            --shadow-glow: 0 0 20px var(--gold-glow);
            --border-ornate: 2px solid var(--gold-primary);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--background-primary) 0%, var(--background-secondary) 50%, var(--background-primary) 100%);
            min-height: 100vh;
            color: var(--available);
            overflow-x: auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 2rem 0;
            background: linear-gradient(90deg, transparent, var(--background-tertiary), transparent);
            border-bottom: var(--border-ornate);
            margin-bottom: 2rem;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            border-radius: 2px;
        }

        .header h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-secondary), var(--gold-primary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--gold-glow);
            margin-bottom: 0.5rem;
        }

        .character-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 1.1rem;
        }

        .stat-item {
            padding: 0.5rem 1rem;
            background: var(--background-tertiary);
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
        }

        /* Main Layout */
        .calculator-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .trees-container {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Talent Tree */
        .talent-tree {
            background: var(--background-secondary);
            border: var(--border-ornate);
            border-radius: 16px;
            padding: 1.5rem;
            min-width: 400px;
            position: relative;
            box-shadow: var(--shadow-deep);
        }

        .talent-tree::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-secondary), var(--gold-primary));
            border-radius: 16px;
            z-index: -1;
            opacity: 0.5;
        }

        .tree-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .tree-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .arms .tree-title { color: var(--arms-color); }
        .fury .tree-title { color: var(--fury-color); }
        .protection .tree-title { color: var(--protection-color); }

        .tree-points {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Talent Grid */
        .talent-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            position: relative;
        }

        /* Tier Rows */
        .tier-row {
            display: contents;
        }

        .tier-divider {
            grid-column: 1 / -1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
            margin: 1rem 0;
            opacity: 0.5;
        }

        /* Talent Slots */
        .talent-slot {
            width: 80px;
            height: 80px;
            border: 2px solid var(--unavailable);
            border-radius: 12px;
            background: var(--background-tertiary);
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .talent-slot:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .talent-slot.available {
            border-color: var(--available);
        }

        .talent-slot.active {
            border-color: var(--active);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .talent-slot.maxed {
            border-color: var(--maxed);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .talent-icon {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .talent-rank {
            position: absolute;
            bottom: 2px;
            right: 4px;
            background: var(--background-primary);
            color: var(--gold-primary);
            font-size: 0.8rem;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 4px;
            border: 1px solid var(--gold-dark);
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            z-index: 1000;
            background: var(--background-primary);
            border: var(--border-ornate);
            border-radius: 8px;
            padding: 1rem;
            max-width: 400px;
            box-shadow: var(--shadow-deep);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--gold-primary);
            margin-bottom: 0.5rem;
        }

        .tooltip-rank {
            color: var(--gold-secondary);
            margin-bottom: 0.5rem;
        }

        .tooltip-description {
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .tooltip-next-rank {
            opacity: 0.7;
            font-style: italic;
            border-top: 1px solid var(--gold-dark);
            padding-top: 0.5rem;
            margin-top: 0.5rem;
        }

        /* Controls */
        .controls {
            text-align: center;
            margin-top: 2rem;
            padding: 2rem;
            background: var(--background-secondary);
            border: 1px solid var(--gold-dark);
            border-radius: 12px;
        }

        .control-button {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
            border: none;
            color: var(--background-primary);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 600;
            cursor: pointer;
            margin: 0 0.5rem;
            transition: all 0.3s ease;
        }

        .control-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .trees-container {
                flex-direction: column;
                align-items: center;
            }
            
            .talent-tree {
                min-width: unset;
                max-width: 500px;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .character-info {
                flex-direction: column;
                gap: 1rem;
            }
            
            .talent-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .talent-slot {
                width: 60px;
                height: 60px;
            }
            
            .talent-icon {
                width: 48px;
                height: 48px;
            }
        }

        /* Animation Effects */
        @keyframes talentGlow {
            0%, 100% { box-shadow: 0 0 15px var(--gold-glow); }
            50% { box-shadow: 0 0 25px var(--gold-glow), 0 0 35px var(--gold-glow); }
        }

        .talent-slot.recently-changed {
            animation: talentGlow 1s ease-in-out;
        }
    </style>
</head>

        // Character state
        let characterLevel = 80;
        let pointsSpent = 0;
        let treePoints = { arms: 0, fury: 0, protection: 0 };
        let talentRanks = {};

        // Tooltip element
        let tooltip = null;

        // Initialize the talent calculator
        function initTalentCalculator() {
            tooltip = document.getElementById('tooltip');
            
            // Render all talent trees
            renderTalentTree('arms');
            renderTalentTree('fury');
            renderTalentTree('protection');
            
            updateDisplay();
        }

        // Render a talent tree
        function renderTalentTree(tree) {
            const grid = document.getElementById(`${tree}-grid`);
            const talents = TALENT_DATA[tree];
            
            grid.innerHTML = '';
            
            // Group talents by tier
            const tiers = {};
            talents.forEach(talent => {
                if (!tiers[talent.tier]) tiers[talent.tier] = [];
                tiers[talent.tier].push(talent);
            });
            
            // Create grid with proper tier spacing
            let currentTier = 1;
            Object.keys(tiers).sort((a, b) => parseInt(a) - parseInt(b)).forEach(tierNum => {
                const tier = parseInt(tierNum);
                
                // Add tier divider if not first tier
                if (tier > 1) {
                    const divider = document.createElement('div');
                    divider.className = 'tier-divider';
                    grid.appendChild(divider);
                }
                
                // Create row for this tier (max 4 talents per row)
                const tierTalents = tiers[tier];
                const tierRow = document.createElement('div');
                tierRow.className = 'tier-row';
                tierRow.style.display = 'grid';
                tierRow.style.gridTemplateColumns = 'repeat(4, 1fr)';
                tierRow.style.gap = '0.5rem';
                tierRow.style.marginBottom = '1rem';
                
                // Fill the row with talents and empty slots
                for (let col = 0; col < 4; col++) {
                    const talent = tierTalents.find(t => t.col === col);
                    if (talent) {
                        const talentSlot = createTalentSlot(talent, tree);
                        tierRow.appendChild(talentSlot);
                    } else {
                        // Empty slot
                        const emptySlot = document.createElement('div');
                        emptySlot.style.width = '80px';
                        emptySlot.style.height = '80px';
                        tierRow.appendChild(emptySlot);
                    }
                }
                
                grid.appendChild(tierRow);
            });
        }

        // Create a talent slot element
        function createTalentSlot(talent, tree) {
            const slot = document.createElement('div');
            slot.className = 'talent-slot';
            slot.id = talent.id;
            
            // Talent icon
            const icon = document.createElement('img');
            icon.className = 'talent-icon';
            icon.src = talent.icon;
            icon.alt = talent.name;
            slot.appendChild(icon);
            
            // Talent rank display
            const rankDisplay = document.createElement('div');
            rankDisplay.className = 'talent-rank';
            slot.appendChild(rankDisplay);
            
            // Event listeners
            slot.addEventListener('click', (e) => handleTalentClick(e, talent, tree));
            slot.addEventListener('contextmenu', (e) => handleTalentRightClick(e, talent, tree));
            slot.addEventListener('mouseenter', (e) => showTooltip(e, talent, tree));
            slot.addEventListener('mouseleave', hideTooltip);
            slot.addEventListener('mousemove', moveTooltip);
            
            return slot;
        }

        // Handle talent left click (add point)
        function handleTalentClick(e, talent, tree) {
            e.preventDefault();
            addTalentPoint(talent, tree);
        }

        // Handle talent right click (remove point)
        function handleTalentRightClick(e, talent, tree) {
            e.preventDefault();
            removeTalentPoint(talent, tree);
        }

        // Add a talent point
        function addTalentPoint(talent, tree) {
            const currentRank = talentRanks[talent.id] || 0;
            const pointsAvailable = (characterLevel - 9) - pointsSpent;
            
            // Check if we can add a point
            if (currentRank >= talent.maxRank || pointsAvailable <= 0) return;
            
            // Check if we have enough points in tree for this tier
            const requiredPoints = (talent.tier - 1) * 5;
            if (treePoints[tree] < requiredPoints) return;
            
            // Add the point
            talentRanks[talent.id] = currentRank + 1;
            pointsSpent++;
            treePoints[tree]++;
            
            updateTalentDisplay(talent);
            updateDisplay();
            refreshTooltip(talent, tree);
            
            // Add visual feedback
            const slot = document.getElementById(talent.id);
            slot.classList.add('recently-changed');
            setTimeout(() => slot.classList.remove('recently-changed'), 1000);
        }

        // Remove a talent point
        function removeTalentPoint(talent, tree) {
            const currentRank = talentRanks[talent.id] || 0;
            if (currentRank <= 0) return;
            
            // TODO: Check for talent dependencies before allowing removal
            
            talentRanks[talent.id] = currentRank - 1;
            pointsSpent--;
            treePoints[tree]--;
            
            updateTalentDisplay(talent);
            updateDisplay();
            refreshTooltip(talent, tree);
            
            // Add visual feedback
            const slot = document.getElementById(talent.id);
            slot.classList.add('recently-changed');
            setTimeout(() => slot.classList.remove('recently-changed'), 1000);
        }

        // Update talent visual state
        function updateTalentDisplay(talent) {
            const slot = document.getElementById(talent.id);
            const rankDisplay = slot.querySelector('.talent-rank');
            const currentRank = talentRanks[talent.id] || 0;
            
            // Update rank display
            if (currentRank > 0) {
                rankDisplay.textContent = `${currentRank}/${talent.maxRank}`;
                rankDisplay.style.display = 'block';
            } else {
                rankDisplay.style.display = 'none';
            }
            
            // Update visual state
            slot.classList.remove('available', 'active', 'maxed');
            
            if (currentRank === talent.maxRank) {
                slot.classList.add('maxed');
            } else if (currentRank > 0) {
                slot.classList.add('active');
            } else {
                slot.classList.add('available');
            }
        }

        // Update display elements
        function updateDisplay() {
            const pointsAvailable = (characterLevel - 9) - pointsSpent;
            
            document.getElementById('character-level').textContent = characterLevel;
            document.getElementById('points-available').textContent = pointsAvailable;
            document.getElementById('points-spent').textContent = pointsSpent;
            
            document.querySelector('.arms-points').textContent = treePoints.arms;
            document.querySelector('.fury-points').textContent = treePoints.fury;
            document.querySelector('.protection-points').textContent = treePoints.protection;
            
            // Update all talent states
            Object.values(TALENT_DATA).flat().forEach(talent => {
                updateTalentDisplay(talent);
            });
        }

        // Show tooltip
        function showTooltip(e, talent, tree) {
            const currentRank = talentRanks[talent.id] || 0;
            
            document.getElementById('tooltip-title').textContent = talent.name;
            document.getElementById('tooltip-rank').textContent = 
                currentRank > 0 ? `Rank ${currentRank}/${talent.maxRank}` : `Rank 0/${talent.maxRank}`;
            
            // Build description
            const description = buildTooltipDescription(talent, currentRank);
            document.getElementById('tooltip-description').innerHTML = description;
            
            // Next rank info
            const nextRankEl = document.getElementById('tooltip-next-rank');
            if (currentRank < talent.maxRank) {
                const nextDescription = buildTooltipDescription(talent, currentRank + 1);
                nextRankEl.innerHTML = `<strong>Next rank:</strong><br>${nextDescription}`;
                nextRankEl.style.display = 'block';
            } else {
                nextRankEl.style.display = 'none';
            }
            
            tooltip.classList.add('visible');
            moveTooltip(e);
        }

        // Hide tooltip
        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        // Move tooltip with mouse
        function moveTooltip(e) {
            const x = e.clientX + 10;
            const y = e.clientY + 10;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        // Refresh tooltip content
        function refreshTooltip(talent, tree) {
            if (tooltip.classList.contains('visible')) {
                showTooltip({ clientX: 0, clientY: 0 }, talent, tree);
            }
        }

        // Build tooltip description with rank values
        function buildTooltipDescription(talent, rank) {
            if (rank === 0) return talent.description;
            
            let description = talent.description;
            const rankValues = talent.ranks[rank - 1];
            
            if (rankValues) {
                // Replace placeholders with rank values
                const values = rankValues.toString().split('/');
                values.forEach((value, index) => {
                    const placeholder = `{${index + 1}}`;
                    description = description.replace(new RegExp(placeholder.replace(/[{}]/g, '\\$&'), 'g'), value);
                });
            }
            
            return description;
        }

        // Control functions
        function resetAllTalents() {
            if (confirm('Are you sure you want to reset all talents?')) {
                talentRanks = {};
                pointsSpent = 0;
                treePoints = { arms: 0, fury: 0, protection: 0 };
                updateDisplay();
            }
        }

        function exportBuild() {
            const buildData = {
                level: characterLevel,
                talents: talentRanks,
                points: treePoints
            };
            
            const buildString = btoa(JSON.stringify(buildData));
            prompt('Copy this build string:', buildString);
        }

        function importBuild() {
            const buildString = prompt('Paste build string:');
            if (!buildString) return;
            
            try {
                const buildData = JSON.parse(atob(buildString));
                characterLevel = buildData.level;
                talentRanks = buildData.talents || {};
                treePoints = buildData.points || { arms: 0, fury: 0, protection: 0 };
                pointsSpent = Object.values(talentRanks).reduce((sum, rank) => sum + rank, 0);
                updateDisplay();
            } catch (e) {
                alert('Invalid build string!');
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initTalentCalculator);
    </script>
</body>
</html>
