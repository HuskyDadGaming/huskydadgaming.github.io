<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Gearing - Master List</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #050308;
            --surface: #0a0812;
            --card-bg: #120c1d;
            --border: #2d243d;
            --accent: #8a2be2;
            --gold: #ffcc33;
            --blue: #33ccff;
            --green: #39ff14;
            --text: #e0dced;
            --dim: #8b869c;
            --btn-bg: #1e152e;
            --danger: #ff4d4d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 900px; padding: 40px 20px; }

        .progress-box {
            background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border);
            margin-bottom: 30px; position: sticky; top: 20px; z-index: 100;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }

        .bar-bg { background: #000; height: 16px; border-radius: 8px; margin-top: 5px; border: 1px solid #1a1a1a; overflow: hidden; }
        #bar-fill { 
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--blue), var(--accent));
            transition: width 0.6s ease;
        }

        .controls-top { margin-top: 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        .btn {
            background: var(--btn-bg); color: #fff; border: 1px solid var(--border);
            padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer;
            font-size: 0.65rem; text-transform: uppercase; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:hover { background: #2d243d; border-color: var(--accent); }

        .group-wrapper { margin-top: 35px; }
        
        .group-header-flex { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        
        .category-header { 
            color: var(--blue); font-size: 0.9rem; font-weight: 800; 
            text-transform: uppercase; display: flex; align-items: center; gap: 10px; flex-grow: 1;
        }
        .category-header::after { 
            content: ""; flex: 1; height: 1px; 
            background: linear-gradient(to right, var(--blue), transparent); 
            opacity: 0.4; margin-left: 10px;
        }

        .group-drag-handle { color: var(--blue); cursor: grab; font-size: 1.4rem; }
        
        .remove-group-btn { 
            color: var(--dim); background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            cursor: pointer; font-size: 0.6rem; text-transform: uppercase; padding: 4px 8px; 
            border-radius: 4px; transition: 0.2s; font-weight: bold;
        }
        .remove-group-btn:hover { color: var(--danger); border-color: var(--danger); background: rgba(255, 77, 77, 0.1); }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
        .row-done td { opacity: 0.4; background: rgba(57, 255, 20, 0.03) !important; }
        .row-done .action-text { text-decoration: line-through; color: var(--green); }

        td { padding: 12px 15px; border-bottom: 1px solid rgba(45, 36, 61, 0.4); vertical-align: middle; }
        
        .col-left { width: 70px; white-space: nowrap; }
        .left-flex { display: flex; align-items: center; gap: 15px; }
        
        .drag-icon { color: var(--dim); cursor: grab; font-size: 1.1rem; text-align: center; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); }

        .col-right { width: 40px; text-align: center; }
        .delete-task { color: var(--dim); cursor: pointer; background: none; border: none; font-size: 1.2rem; line-height: 1; padding: 0; }
        .delete-task:hover { color: var(--danger); }

        .action-text { font-weight: 600; color: #fff; display: block; font-size: 0.95rem; }
        .desc-text { font-size: 0.75rem; color: var(--dim); display: block; margin-top: 2px; }

        .btn-add { margin: 5px auto 0 0; width: 80px; font-size: 0.6rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-box">
        <div style="display:flex; justify-content:space-between; align-items: flex-end; font-weight: 900; margin-bottom: 8px;">
            <span style="font-size: 1.1rem;">TOTAL PROGRESS</span>
            <span id="percent-text" style="color: var(--blue); font-size: 1.8rem;">0%</span>
        </div>
        <div class="bar-bg"><div id="bar-fill"></div></div>
        
        <div class="controls-top">
            <button class="btn" onclick="addNewGroup()">📁 New Group</button>
            <button class="btn" onclick="saveState(true)">💾 Save</button>
            <button class="btn" onclick="resetToDefault()">↩️ Reset</button>
            <button class="btn" onclick="weeklyReset()">🧹 Clear</button>
        </div>
    </div>

    <div id="task-groups-container"></div>
</div>

<script>
    // UPDATED MASTER ORDER FROM IMAGE_447F26.PNG
    const defaultData = [
        { title: "World Weeklies and Quests", id: "world", tasks: [
            { id: "w1", text: "Buy Rep Contract from AH", desc: "Maximize Reputation gains" },
            { id: "w2", text: "Complete Any New Campaign", desc: "Complete New Chapters" },
            { id: "w3", text: "Neighbourhood", desc: "Weekly Quest - Easy Crest bundles" },
            { id: "w4", text: "Silvermoon", desc: "Pickup all available from Silvermoon" },
            { id: "w5", text: "World Boss", desc: "Champion gear ilvl 250 drop chance" },
            { id: "w6", text: "Singularity (Decimus)", desc: "Decimus Storyline - Elemental Voidcores" }
        ]},
        { title: "Delves", id: "delve", tasks: [
            { id: "d1", text: "Gilded Jackpot (Delve Rank 4)", desc: "Run Tier 11s for Hero/Mythic crests" },
            { id: "d2", text: "Bountiful", desc: "Spend all Keys" },
            { id: "d3", text: "Nullaeus ?", desc: "Kill weekly for 5 Hero crests" },
            { id: "d4", text: "Nullaeus ??", desc: "Kill weekly for 5 Mythic crests" }
        ]},
        { title: "Prey", id: "prey", tasks: [
            { id: "p1", text: "Prey - Nightmare", desc: "Renown Rank 4 - Unlocks Nightmare Mode" }
        ]},
        { title: "Faction Weeklies", id: "faction", tasks: [
            { id: "f1", text: "Singularity (Stormarion Assault)", desc: "Singularity Renown 7 (Champion Trinket - ilvl 246)" },
            { id: "f2", text: "Silvermoon Court (Saltheril’s Soiree)", desc: "Reputation and event rewards" },
            { id: "f3", text: "Hara'ti (Legends of the Haranir)", desc: "Reputation and event rewards" },
            { id: "f4", text: "Amani-Tribe (The Abundance)", desc: "Reputation and event rewards" }
        ]},
        { title: "Optional Weeklies", id: "optional", tasks: [
            { id: "ow1", text: "Special Assignments", desc: "Check for active world event assignments" },
            { id: "ow2", text: "World Quests", desc: "Quick easy gear, Adventurer only" }
        ]},
        { title: "Crafting", id: "craft", tasks: [
            { id: "c1", text: "First profession patron weekly", desc: "Craft x3 patron work orders" },
            { id: "c2", text: "Second profession patron weekly", desc: "Craft x3 patron work orders" },
            { id: "c3", text: "First profession contract", desc: "Submit work order" },
            { id: "c4", text: "Second profession contract", desc: "Submit work order" }
        ]},
        { title: "Reputation", id: "rep", tasks: [
            { id: "r1", text: "Singularity rep", desc: "Renown 7 - Unlock Champion trinket ilvl 246" },
            { id: "r2", text: "Silvermoon Court rep", desc: "Renown 9 - Unlock Champion head ilvl 246" },
            { id: "r3", text: "Hara'ti rep", desc: "Renown 8 - Unlock Champion belt ilvl 246" },
            { id: "r4", text: "Amani-Tribe rep", desc: "Renown 9 - Unlock Champion neck ilvl 246" }
        ]}
    ];

    // ... (rest of the logic remains same for rendering, sync, and saving)
    function createTaskRow(id, text, desc, checked = false) {
        const tr = document.createElement('tr');
        tr.dataset.id = id;
        if(checked) tr.classList.add('row-done');
        tr.innerHTML = `
            <td class="col-left"><div class="left-flex"><span class="drag-icon">⠿</span><input type="checkbox" class="prog-task" ${checked ? 'checked' : ''} onchange="sync()"></div></td>
            <td><span class="action-text">${text}</span><span class="desc-text">${desc}</span></td>
            <td class="col-right"><button class="delete-task" onclick="removeTask(this)">×</button></td>
        `;
        return tr;
    }

    function createGroupUI(group) {
        const wrapper = document.createElement('div');
        wrapper.className = "group-wrapper";
        wrapper.innerHTML = `
            <div class="group-header-flex"><span class="group-drag-handle">⠿</span><div class="category-header">${group.title}</div><button class="remove-group-btn" onclick="removeGroup(this)">Remove Group</button></div>
            <table><tbody class="sortable-list" data-group="${group.id}"></tbody></table>
            <button class="btn btn-add" onclick="addTaskPrompt('${group.id}')">+ Task</button>
        `;
        const tbody = wrapper.querySelector('tbody');
        group.tasks.forEach(t => tbody.appendChild(createTaskRow(t.id, t.text, t.desc, t.checked)));
        return wrapper;
    }

    function sync() {
        const allTasks = document.querySelectorAll('.prog-task');
        const countableTasks = Array.from(allTasks).filter(cb => {
            const groupWrapper = cb.closest('.group-wrapper');
            return groupWrapper && groupWrapper.querySelector('.category-header').innerText.trim().toUpperCase() !== "REPUTATION";
        });
        allTasks.forEach(cb => cb.closest('tr').classList.toggle('row-done', cb.checked));
        const done = countableTasks.filter(cb => cb.checked).length;
        const p = countableTasks.length ? Math.round((done / countableTasks.length) * 100) : 0;
        document.getElementById('bar-fill').style.width = p + '%';
        document.getElementById('percent-text').innerText = p + '%';
    }

    function renderGroups(data) {
        const container = document.getElementById('task-groups-container');
        container.innerHTML = '';
        data.forEach(group => container.appendChild(createGroupUI(group)));
        document.querySelectorAll('.sortable-list').forEach(list => new Sortable(list, { group: 'tasks', animation: 150, handle: '.drag-icon', onEnd: () => saveState(false) }));
        new Sortable(container, { animation: 150, handle: '.group-drag-handle', onEnd: () => saveState(false) });
        sync();
    }

    function saveState(manual) {
        const groups = [];
        document.querySelectorAll('.group-wrapper').forEach(wrap => {
            const list = wrap.querySelector('.sortable-list');
            const tasks = [];
            list.querySelectorAll('tr').forEach(tr => tasks.push({ id: tr.dataset.id, text: tr.querySelector('.action-text').innerText, desc: tr.querySelector('.desc-text').innerText, checked: tr.querySelector('input').checked }));
            groups.push({ id: list.dataset.group, title: wrap.querySelector('.category-header').innerText, tasks: tasks });
        });
        localStorage.setItem('midnight_save_vComplete', JSON.stringify(groups));
        if(manual) alert("Progress Saved");
    }

    function addTaskPrompt(groupId) {
        const n = prompt("Task Name:"), d = prompt("Description:");
        if(n) { document.querySelector(`.sortable-list[data-group="${groupId}"]`).appendChild(createTaskRow("c_" + Date.now(), n, d || "")); saveState(false); sync(); }
    }

    function addNewGroup() {
        const n = prompt("Group Name:");
        if(n) { const g = { title: n, id: "g_" + Date.now(), tasks: [] }; renderGroups([...JSON.parse(localStorage.getItem('midnight_save_vComplete') || "[]"), g]); saveState(false); }
    }

    function removeTask(btn) { btn.closest('tr').remove(); sync(); saveState(false); }
    function removeGroup(btn) { if(confirm("Delete entire group?")) { btn.closest('.group-wrapper').remove(); sync(); saveState(false); } }
    function weeklyReset() { document.querySelectorAll('.prog-task').forEach(cb => cb.checked = false); sync(); saveState(false); }
    function resetToDefault() { if(confirm("Reset to default?")) { localStorage.removeItem('midnight_save_vComplete'); renderGroups(defaultData); } }

    window.onload = () => renderGroups(JSON.parse(localStorage.getItem('midnight_save_vComplete')) || defaultData);
</script>
</body>
</html>
